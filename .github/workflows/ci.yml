name: CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm install

      - name: Correr pruebas
        run: npm test

      - name: Generar artefacto (zip de la app)
        run: zip -r app-artifact.zip . -x "*.git*" "node_modules/*"

      - name: Subir artefacto
        uses: actions/upload-artifact@v3
        with:
          name: app-artifact
          path: app-artifact.zip
